services:
  - type: web
    name: moneymirror-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://moneymirror.vercel.app
      - key: OPENAI_API_KEY
        value: ""
    healthCheckPath: /health
